name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-latest
            build_command: bash apps/electron/scripts/build-linux.sh x64
            artifact_glob: |
              apps/electron/release/Craft-Agents-x64.AppImage
              apps/electron/release/latest-linux.yml
              apps/electron/release/*.blockmap
          - id: mac-x64
            os: macos-latest
            build_command: bash apps/electron/scripts/build-dmg.sh x64
            artifact_glob: |
              apps/electron/release/Craft-Agents-x64.dmg
              apps/electron/release/Craft-Agents-x64.zip
              apps/electron/release/Craft-Agents-arm64.dmg
              apps/electron/release/Craft-Agents-arm64.zip
              apps/electron/release/latest-mac.yml
              apps/electron/release/*.blockmap
          - id: windows-x64
            os: windows-latest
            build_command: powershell -ExecutionPolicy Bypass -File apps/electron/scripts/build-win.ps1
            artifact_glob: |
              apps/electron/release/Craft-Agents-x64.exe
              apps/electron/release/latest.yml
              apps/electron/release/*.blockmap
              apps/electron/release/builder-debug.yml
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.10"

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            rpm \
            libopenjp2-tools \
            libfuse2

      - name: Build release package
        run: ${{ matrix.build_command }}

      - name: Capture release metadata
        id: meta
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          if [ -z "$tag_name" ]; then
            tag_name="$(git describe --tags --exact-match)"
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          append_body: false
          generate_release_notes: true
          files: ${{ matrix.artifact_glob }}
