name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-linux-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            rpm \
            libopenjp2-tools \
            libfuse2

      - name: Build Linux AppImage
        run: bash apps/electron/scripts/build-linux.sh x64

      - name: Capture release metadata
        id: meta
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          if [ -z "$tag_name" ]; then
            tag_name="$(git describe --tags --exact-match)"
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          generate_release_notes: true
          files: |
            apps/electron/release/Craft-Agents-x64.AppImage
            apps/electron/release/*.yml
            apps/electron/release/*.blockmap

